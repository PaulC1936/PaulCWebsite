<!DOCTYPE html>
<html>
<head>
<title>🌳Paul Cumming - Contact🌳</title>
<meta name="viewport" content="width=device-width", initial-scale=1.0, charset="utf-8">
<link rel="stylesheet" type= text/css href="contactstyle/contact.css">
</head>
<body>
  <div>
    <a href="javascript:setTimeout(()=>{window.location = '../../index.html'},1100);"><img src="../../imagesab/back.gif" class="gamehusk"></a>
  </div>
  <div class="loadcontainer" id="loadcontainer">
    <div>
     <img class="loadinggif" src='pages/loading/LOADING.gif' alt="loading gif" id="loader">
    </div>
    <div class="whiteOut" id="whiteOut">
    </div>
   </div>
   <div class="topbox" id="topBox">
    <img class="contactimgvert" src="contactimg/ContactpagebannerVERT.webp" id= "gallbann" alt="contact banner vertical">
    <img class="contactimg" src="contactimg/Contactpagebanner.webp" id= "gallbann" alt="contact banner">
    <img src="contactimg/dropline.webp" class="circle" id="Mickcircle" data-speed="2" alt="Mickey circle">
    <img src="contactimg/pickup.webp" class="comments" id="comments" data-speed="2" alt="comment box">
    <img src="contactimg/spamfree.webp" class="negSpace" id="negSpace" data-speed="2" alt="negspace">
   </div>
  <div id="skullOne" class="skullOne">
    <img src="contactimg/handone.webp" alt="stationary skull" class="skullWon">
  </div>
  <div id="giffy" class="giffy">
    <img src="contactimg/contacthand.gif"  class= spinSkull id="spinSkull" alt="spinning skull">
  </div>
  <!--div class="signupWrap"-->
    <div class="signup" id= signup alt="signup form">
        <img loading="lazy" src="contactimg/smallbookform.webp" class="signupForm" alt="Signup Form">
        <form form action="https://api.web3forms.com/submit" method="POST" class="form">
          <input type="hidden" name="access_key" value="bd32a7b0-5133-4960-b2c1-a68d2e393cd4">
          <input type="text" name="name"  id =nameInput  class="nameInput" autocomplete="on" required>
          <input type="email" name="email"  id= emailInput class="emailInput" autocomplete="on" required>
          <textarea name="message" required id="messageArea" class="messageArea"></textarea>
          <input type="checkbox" id= checkbox name="botcheck" class="hidden" style="display: none;">
          <input type="hidden" name="redirect" value='../pages/thanks/thanks.html'>
          <button type="submit"><img src="contactimg/submit.gif"></button>
        </form>
    </div>
    
  <!--div class="spacer"></div-->
</body>
 <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js">async</script>
 <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js">async</script>
 <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollToPlugin.min.js">async</script>
<script>document.addEventListener("DOMContentLoaded", (event) => {
   gsap.registerPlugin(ScrollTrigger)})</script>
<script src="contactjs/contact.js"></script>
</body>
</html>
